<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!--I don't think I understand the difference between ".Title" and ".Page.Title"-->
  <title>{{ .Title }}</title>
  {{ $style := resources.Get "css/tailwind.css" }}
  <link href="{{ $style.Permalink }}" rel="stylesheet">
  <!--This beautiful gradient is a modification of this snippet by Manuel Pinto-->
  <!--https://codepen.io/P1N2O/pen/pyBNzX-->
  <!--Comment out the styles tag to bring back the old background-->
  <!--Comment this out to get rid of the linear gradient background-->
  <style>
    body {
      background: linear-gradient(
        -45deg,
        #357266,
        #16161e,
        #2e2e2e,
        #004953,
        #4d0026,
        #3d550c
        );
      background-size: 600% 600%;
      animation: gradient 15s ease infinite;
      height: 100vh;
    }

    @keyframes gradient {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }
  </style>
</head>
