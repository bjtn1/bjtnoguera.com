{{ define "main" }}
<!--
This is the default layout used for list pages

List pages are folders containing the `_index.md` file and a bunch of other .md files inside it
Example:
./content/notes/_index.md

is a leaf page
-->
<div class="px-12 flex justify-center items-center" style="min-height: 85vh;">
  <!--Hero section-->
  <div class="flex flex-col pl-12 justify-center items-start w-2/3">
    {{ range.Pages.ByTitle }}
    <div>
      <a href="{{ .RelPermalink }}"><h1 class="text-7xl hover:text-blue hover:scale-105 duration-150 ease-in-out">{{ .Title }}</h1></a>
    </div>
    {{ end }}
  </div>

  <!--Menu section to the right of hero section-->
  {{ partial "not-home-menu.html" . }}
</div>
{{ end }}
