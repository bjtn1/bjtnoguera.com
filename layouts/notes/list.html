{{ define "main" }}
<style>
  h1 {
    font-size: 2.25rem; /* 20px */
    line-height: 2.5rem; /* 28px */
    font-weight: 600;
  }
  .main-box {
    margin-top: 10vh;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, auto));
  }

  .page-box {
    transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
    transition-duration: 250ms;
  }

  .page-box:hover {
    transform: scale(1.05);
    text-decoration: underline;}
</style>

<div class="main-box">
  {{ range.Pages.ByTitle }}
    <div class="page-box">
      <a href="{{ .RelPermalink }}">
        <h1>
          {{ .Title }}
        </h1> 
      </a>
    </div>
  {{ end  }}
</div>
{{ end }}
