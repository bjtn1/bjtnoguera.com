{{ define "main" }}
  <style>
    h1 {
      font-size: 2.25rem; /* 20px */
      line-height: 2.5rem; /* 28px */
      font-weight: 600;
      padding-top: 0.125rem; /* 8px */
      padding-bottom: 0.125rem; /* 8px */
    }
    .main-container {
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10vh;
    }
    .page-box {
      transition: transform 0.4s ease-in-out;
      align-self: center;
    }

    .page-box:hover {
      transform: scale(1.25);
    }
  </style>
  
  <div class="main-container">
    {{ range.Pages.ByTitle }}
      <div class="page-box">
        <a href="{{ .RelPermalink }}">
          <h1>
            {{ .Title }}
          </h1> 
        </a>
      </div>
    {{ end  }}
  </div>
{{ end }}
