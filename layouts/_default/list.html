{{ define "main" }}
<div class="px-12 grid w-full h-full" style="grid-template-columns: 1fr 2fr;">
  {{ partial "menu.html" . }}
  <div class="flex flex-col justify-center items-start">
    {{ range.Pages.ByTitle }}
    <div>
      <a href="{{ .RelPermalink }}"><h1 class="text-7xl hover:text-blue hover:scale-105 duration-150 ease-in-out">{{ .Title }}</h1></a>
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
