{{ define "main" }}
<div class="
  flex
  flex-col
  justify-center
  items-center
  w-full
  "
>
  {{ range.Pages.ByTitle }}
  <div>
    <a href="{{ .RelPermalink }}">
      <h1 class="
        text-7xl
        hover:text-blue
        hover:scale-105
        duration-150
        ease-in-out
        "
      >
        {{ .Title }}
      </h1>
    </a>
  </div>
  {{ end }}
</div>
{{ end }}
