{{ define "main" }}
<div class="px-12 grid w-full h-full" style="grid-template-columns: 1fr 2fr 1fr;">
  <!--Left menu section-->
  {{ partial "menu.html" . }}

  <!--Center section: contains main content-->
  <div class="flex flex-col justify-center items-start overflow-y-scroll">
    <div class="
      prose
      prose-maincolors
      prose-lg
      hover:prose-a:underline
      prose-a:no-underline
      ">
      {{ .Content }}
    </div>
  </div>

  <!--Right section: contains main content's toc-->
  {{ partial "toc-navbar.html" . }}
</div>
{{ end }}
