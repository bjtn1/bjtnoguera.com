<!DOCTYPE html>
<html lang="{{ site.LanguageCode }}">
  {{ partial "head.html" . }}
  <body class="text-white flex flex-col justify-between" style="height: 100vh;">
    <header>
      {{ partial "header.html" . }}
    </header>

    <main style="flex: 1; max-height: 500px;">
      {{ block "main" . }} {{ end }}
    </main>

    <footer class="w-full">
      {{ partial "footer.html" . }}
    </footer>
  </body>
</html>
