<!DOCTYPE html>
<html lang="{{ site.LanguageCode }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Title }}</title>

    {{ $style := resources.Get "css/tailwind.css" }}
    <link href="{{ $style.Permalink }}" rel="stylesheet">

    {{ partial "bg-linear-gradient.html" . }}

    <style>
      a:hover {
        color: #82aaff;
      }
    </style>
  </head>


  <body class="
    xl:text-white
    xl:h-screen
    xl:flex
    xl:flex-col
    xl:justify-between
    "
  >

    <header class="
      xl:p-4
      xl:flex
      xl:justify-center
      "
    >
      <div class="
        xl:px-4
        xl:max-w-fit
        xl:flex
        xl:justify-center
        xl:text-white
        xl:bg-search-bg
        xl:rounded-3xl 
        xl:border-solid
        xl:border-black
        xl:text-lg
        "
        style="border-color: rgba(255,255,255,.08)"
      >
        <!-- <input type="search" placeholder="Search..." class="border border-solid border-black"> -->
        <a href="{{ .Site.BaseURL }}about" class="
          xl:py-2
          xl:px-4
          xl:hover:text-blue
          xl:hover:scale-105
          xl:duration-150
          xl:ease-in-out
          "
        >
          About
        </a>
        <a href="{{ .Site.BaseURL }}" class="
          xl:py-2
          xl:px-4
          xl:hover:text-blue
          xl:hover:scale-105
          xl:duration-150
          xl:ease-in-out
          "
        >
          Home
        </a>
        <a href="{{ .Site.BaseURL }}notes" class="
          xl:py-2
          xl:px-4
          xl:hover:text-blue
          xl:hover:scale-105
          xl:duration-150
          xl:ease-in-out
          "
        >
          Notes
        </a>
        <a href="{{ .Site.BaseURL }}projects" class="
          xl:py-2
          xl:px-4
          xl:hover:text-blue
          xl:hover:scale-105
          xl:duration-150
          xl:ease-in-out
          "
        >
          Projects
        </a>
        <button class="
          xl:py-2
          xl:px-4
          xl:hover:text-blue
          xl:hover:scale-105
          xl:duration-150
          xl:ease-in-out
          "
        >
          Search
        </button>
      </div>
    </header>

    <main class="
      xl:flex-1
      xl:overflow-y-scroll
      "
      style="max-height: 80vh;"
    >
      {{ block "main" . }} {{ end }}
    </main>

    <footer class="
      xl:w-full
      ">
      <div class="
        xl:text-white-50
        xl:text-xs
        xl:text-center
        xl:py-6
        "
      >
        Copyright © {{ now.Year }} Brandon Jose Tenorio Noguera
        <br>
        Built with
        <a href="https://gohugo.io/" target="_blank" rel="noopener noreferrer" class="
          xl:hover:text-blue
          xl:hover:scale-105
          xl:duration-150
          xl:ease-in-out
          "
        >
          Hugo
        </a>
      </div>
    </footer>
  </body>
</html>
