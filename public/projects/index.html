<!DOCTYPE html>
<html lang="en-us">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <title>Projects</title>
  
  <link href="/css/tailwind.css" rel="stylesheet">

  

<style>
  body {
    background: linear-gradient(
      -45deg,
      #357266,
      #16161e,
      #2e2e2e,
      #004953,
      #4d0026,
      #3d550c
      );
    background-size: 600% 600%;
    animation: gradient 15s ease infinite;
  }

  @keyframes gradient {
    0% {
      background-position: 0% 50%;
    }
    50% {
      background-position: 100% 50%;
    }
    100% {
      background-position: 0% 50%;
    }
  }
</style>


  <style>
     
      
    a:hover {
      color: #82aaff;
    }
  </style>
</head>


  <body class="text-white flex flex-col justify-between" style="height: 100vh;">
    <header>
      <div class="py-6 flex justify-center">
  <input type="search" placeholder="Search..." class="text-center text-white-50 p-1 w-40 backdrop-blur-lg bg-search-bg rounded-3xl outline-none" style="border: 1px solid rgba(255,255,255,.08);">
</div>

    </header>

    <main style="flex: 1; max-height: 500px;">
      
<div class="px-12 grid w-full h-full" style="grid-template-columns: 1fr 2fr;">
  <div class="flex gap-x-8 items-center">
  <div class="text-7xl flex flex-col">
    <a href="/about" class="hover:text-blue hover:scale-105 duration-150 ease-in-out">About</a>
    <a href="/" class="hover:text-blue hover:scale-105 duration-150 ease-in-out">Home</a>
    <a href="/notes" class="hover:text-blue hover:scale-105 duration-150 ease-in-out">Notes</a>
    <a href="/projects" class="hover:text-blue hover:scale-105 duration-150 ease-in-out">Projects</a>
  </div>
  <div class="border-e-2 border-white-50 border-dotted h-96"></div>
</div>

  <div class="flex flex-col justify-center items-start">
    
  </div>
</div>

    </main>

    <footer class="w-full">
      <div class="text-white-50 text-sm text-center py-6">
  Copyright © 2023 Brandon Jose Tenorio Noguera
  <br>
  Built with <a href="https://gohugo.io/" target="_blank" rel="noopener noreferrer" class="hover:text-blue hover:scale-105 duration-150 ease-in-out">Hugo</a>
</div>

    </footer>
  </body>
</html>
